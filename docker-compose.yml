version: '3.9'

services:
  # Supabase local stack
  supabase-db:
    image: supabase/postgres:15.1.0.117
    container_name: votesphere-db
    ports:
      - '5432:5432'
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - supabase-db-data:/var/lib/postgresql/data
      - ./supabase/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 10

  # NestJS API
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile.dev
    container_name: votesphere-api
    ports:
      - '4000:4000'
    env_file:
      - .env.local
    volumes:
      - ./apps/api/src:/app/src
    depends_on:
      supabase-db:
        condition: service_healthy

  # Next.js Web App
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile.dev
    container_name: votesphere-web
    ports:
      - '3000:3000'
    env_file:
      - .env.local
    volumes:
      - ./apps/web:/app
      - /app/node_modules
    depends_on:
      - api

volumes:
  supabase-db-data:
